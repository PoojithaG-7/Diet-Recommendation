<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet System Database Viewer</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header { 
            text-align: center; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
        }
        .nav { 
            display: flex; 
            justify-content: space-around; 
            margin-bottom: 20px; 
            flex-wrap: wrap;
        }
        .nav button { 
            padding: 10px 20px; 
            margin: 5px; 
            border: none; 
            border-radius: 5px; 
            background: #667eea; 
            color: white; 
            cursor: pointer; 
            transition: all 0.3s ease;
        }
        .nav button:hover { 
            background: #764ba2; 
            transform: translateY(-2px);
        }
        .content { 
            padding: 20px; 
            background: #f8f9fa; 
            border-radius: 10px; 
            min-height: 400px;
        }
        .table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px;
        }
        .table th, .table td { 
            border: 1px solid #ddd; 
            padding: 12px; 
            text-align: left; 
        }
        .table th { 
            background: #667eea; 
            color: white; 
            font-weight: bold;
        }
        .table tr:hover { background: #f5f5f5; }
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 20px;
        }
        .stat-card { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            text-align: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .stat-number { 
            font-size: 2em; 
            font-weight: bold; 
            color: #667eea;
        }
        .loading { 
            text-align: center; 
            padding: 40px; 
            font-size: 18px;
        }
        .error { 
            background: #f8d7da; 
            color: #721c24; 
            padding: 15px; 
            border-radius: 5px; 
            margin-bottom: 20px;
        }
        .success { 
            background: #d4edda; 
            color: #155724; 
            padding: 15px; 
            border-radius: 5px; 
            margin-bottom: 20px;
        }
        .search { 
            margin-bottom: 20px; 
            display: flex; 
            gap: 10px;
        }
        .search input { 
            flex: 1; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 5px;
        }
        .search button { 
            padding: 10px 20px; 
            border: none; 
            border-radius: 5px; 
            background: #667eea; 
            color: white; 
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗄️ Diet System Database Viewer</h1>
            <p>SQLite Database - Real-time Data Access</p>
        </div>
        
        <div class="nav">
            <button onclick="showStatistics()">📊 Statistics</button>
            <button onclick="showUsers()">👥 Users</button>
            <button onclick="showProfiles()">📋 Profiles</button>
            <button onclick="showMeals()">🍽️ Meals</button>
            <button onclick="showExercises()">🏃 Exercises</button>
            <button onclick="showWater()">💧 Water</button>
            <button onclick="showTables()">📚 Tables</button>
        </div>
        
        <div class="content" id="content">
            <div class="loading">
                <h2>Welcome to Database Viewer</h2>
                <p>Select an option above to view database data</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        async function fetchData(endpoint) {
            try {
                const response = await fetch(`${API_BASE}/${endpoint}`);
                if (!response.ok) throw new Error('Failed to fetch data');
                return await response.json();
            } catch (error) {
                showError(`Error: ${error.message}`);
                return null;
            }
        }
        
        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">❌ ${message}</div>
            `;
        }
        
        function showSuccess(message) {
            document.getElementById('content').innerHTML = `
                <div class="success">✅ ${message}</div>
            `;
        }
        
        function createTable(data, headers) {
            if (!data || data.length === 0) {
                return '<p>No data available</p>';
            }
            
            let table = '<table class="table"><thead><tr>';
            headers.forEach(header => {
                table += `<th>${header}</th>`;
            });
            table += '</tr></thead><tbody>';
            
            data.forEach(row => {
                table += '<tr>';
                headers.forEach(header => {
                    table += `<td>${row[header] || 'N/A'}</td>`;
                });
                table += '</tr>';
            });
            
            table += '</tbody></table>';
            return table;
        }
        
        async function showStatistics() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Loading statistics...</div>';
            
            try {
                // Since we don't have a direct stats endpoint, we'll show database info
                const health = await fetchData('health');
                if (health) {
                    content.innerHTML = `
                        <h2>📊 Database Statistics</h2>
                        <div class="stats">
                            <div class="stat-card">
                                <div class="stat-number">🗄️</div>
                                <div>SQLite Database</div>
                                <div>Persistent Storage</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">✅</div>
                                <div>System Status</div>
                                <div>${health.status || 'Healthy'}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">🔄</div>
                                <div>Data Persistence</div>
                                <div>Enabled</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">👥</div>
                                <div>User Management</div>
                                <div>Active</div>
                            </div>
                        </div>
                        <h3>Database Features:</h3>
                        <ul>
                            <li>✅ Persistent user data storage</li>
                            <li>✅ Meal logging with nutrition tracking</li>
                            <li>✅ Exercise and activity monitoring</li>
                            <li>✅ Water intake tracking</li>
                            <li>✅ User profile management</li>
                            <li>✅ Data survives server restarts</li>
                        </ul>
                    `;
                }
            } catch (error) {
                showError('Failed to load statistics');
            }
        }
        
        async function showUsers() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Loading users...</div>';
            
            try {
                const users = await fetchData('admin/users');
                if (users && users.success) {
                    const table = createTable(users.users, [
                        'id', 'name', 'email', 'age', 'gender', 'weight', 
                        'height', 'bmi', 'activity_level', 'goal', 'has_diet_plan'
                    ]);
                    content.innerHTML = `
                        <h2>👥 All Users (${users.total_count})</h2>
                        ${table}
                    `;
                } else {
                    showError('Failed to load users');
                }
            } catch (error) {
                showError('Failed to load users');
            }
        }
        
        async function showProfiles() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Loading user profiles...</div>';
            
            try {
                const users = await fetchData('admin/users');
                if (users && users.success) {
                    const completedUsers = users.users.filter(u => u.has_diet_plan);
                    const table = createTable(completedUsers, [
                        'name', 'email', 'age', 'gender', 'weight', 'height', 
                        'bmi', 'activity_level', 'goal', 'daily_calories_needed'
                    ]);
                    content.innerHTML = `
                        <h2>📋 User Profiles (${completedUsers.length} completed)</h2>
                        <p>Showing users who have completed their diet plans</p>
                        ${table}
                    `;
                } else {
                    showError('Failed to load profiles');
                }
            } catch (error) {
                showError('Failed to load profiles');
            }
        }
        
        async function showMeals() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <h2>🍽️ Meal Logs</h2>
                <div class="search">
                    <input type="text" id="mealSearch" placeholder="Search meals...">
                    <button onclick="searchMeals()">🔍 Search</button>
                </div>
                <div class="loading">Loading meal data...</div>
            `;
            
            // For now, show a message about meal logging
            content.innerHTML += `
                <h3>Meal Logging Features:</h3>
                <ul>
                    <li>🍽️ Track breakfast, lunch, dinner, and snacks</li>
                    <li>🥗 Automatic nutrition calculation</li>
                    <li>📊 Calorie and macronutrient tracking</li>
                    <li>📅 Daily and historical meal data</li>
                    <li>🔄 Data persists in database</li>
                </ul>
                <p>To view meal data, use the command-line database viewer or Python viewer.</p>
            `;
        }
        
        async function showExercises() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <h2>🏃 Exercise Logs</h2>
                <div class="loading">Loading exercise data...</div>
            `;
            
            // Show exercise features
            content.innerHTML += `
                <h3>Exercise Tracking Features:</h3>
                <ul>
                    <li>🏃 Track various exercise types</li>
                    <li>⏱️ Monitor duration and calories</li>
                    <li>📊 Exercise history and trends</li>
                    <li>🎯 Goal-based exercise plans</li>
                    <li>💪 Strength and cardio tracking</li>
                    <li>🔄 Data persists in database</li>
                </ul>
                <p>To view exercise data, use the command-line database viewer or Python viewer.</p>
            `;
        }
        
        async function showWater() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <h2>💧 Water Intake Logs</h2>
                <div class="loading">Loading water data...</div>
            `;
            
            // Show water tracking features
            content.innerHTML += `
                <h3>Water Tracking Features:</h3>
                <ul>
                    <li>💧 Track daily water intake</li>
                    <li>🥛 Monitor glasses and milliliters</li>
                    <li>📊 Daily goals and progress</li>
                    <li>📅 Historical water consumption</li>
                    <li>🎯 Hydration reminders</li>
                    <li>🔄 Data persists in database</li>
                </ul>
                <p>To view water data, use the command-line database viewer or Python viewer.</p>
            `;
        }
        
        async function showTables() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <h2>📚 Database Tables</h2>
                <div class="loading">Loading table information...</div>
            `;
            
            // Show database table information
            content.innerHTML = `
                <h3>Database Schema:</h3>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number">👥</div>
                        <div>users</div>
                        <div>User accounts</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">📋</div>
                        <div>user_profiles</div>
                        <div>User details</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">🍽️</div>
                        <div>diet_logs</div>
                        <div>Meal tracking</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">🏃</div>
                        <div>exercise_logs</div>
                        <div>Activity tracking</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">💧</div>
                        <div>water_logs</div>
                        <div>Hydration tracking</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">📋</div>
                        <div>user_daily_tasks</div>
                        <div>Daily tasks</div>
                    </div>
                </div>
                <h3>Database File:</h3>
                <p><strong>Location:</strong> c:\project4\Diet Recommendation System\backend\diet_system.db</p>
                <p><strong>Type:</strong> SQLite (file-based database)</p>
                <p><strong>Size:</strong> Varies based on data (typically a few MB)</p>
                <p><strong>Backup:</strong> Simply copy the .db file</p>
            `;
        }
        
        // Initialize the page
        window.onload = function() {
            showStatistics();
        };
    </script>
</body>
</html>
