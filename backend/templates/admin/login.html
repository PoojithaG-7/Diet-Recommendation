<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Developer admin — Diet Recommendation System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 28rem;">
    <h1 class="h4 mb-3">Developer admin</h1>
    <p class="text-muted small">Enter the <code>ADMIN_SECRET</code> configured on the server.</p>
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('admin.admin_login') }}">
      <div class="mb-3">
        <label class="form-label" for="admin_key">Admin key</label>
        <input class="form-control" type="password" id="admin_key" name="admin_key" required autocomplete="off" />
      </div>
      <button class="btn btn-primary w-100" type="submit">Unlock dashboard</button>
    </form>
  </div>
</body>
</html>
